info:
  name: 07_Menu-CheckStock
  type: http
  seq: 7

http:
  method: GET
  url: "{{URL}}/menu"
  auth:
    type: bearer
    token: "{{jwt_token}}"

runtime:
  scripts:
    - type: after-response
      code: |-
        test("Status code should be 200", function() {
          expect(res.getStatus()).to.equal(200);
        });

        // Check Content-Type is JSON before parsing body
        const contentType = res.getHeader("Content-Type");

        const body = res.getBody();
        test("Response should be an array", function() {
          expect(body).to.be.an('array');
        });

        test("Each menu item should have required properties", function() {
          body.forEach((item, index) => {
            expect(item).to.have.property("id");
            expect(item).to.have.property("name");
            expect(item).to.have.property("price");
            expect(item).to.have.property("stock");
          });
        });

        test("Stock should be greater than 0 for all items", function() {
          body.forEach((item, index) => {
            expect(item.stock).to.be.greaterThan(0);
            expect(item.price).to.be.greaterThan(0);
          });
        });

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
