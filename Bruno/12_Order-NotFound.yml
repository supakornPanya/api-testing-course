info:
  name: 12_Order-NotFound
  type: http
  seq: 12

http:
  method: GET
  url: "{{URL}}/orders/0123456"
  auth:
    type: bearer
    token: "{{jwt_token}}"

runtime:
  scripts:
    - type: after-response
      code: |-
        test("Status code should be 200", function() {
          expect(res.getStatus()).to.equal(200);
        });

        const body = res.getBody();
        test("Response should contain error property", function() {
          expect(body).to.have.property("error");
          expect(body.error).to.not.be.empty;
        });

        test("Error message should indicate order not found", function() {
          expect(body.error).to.equal("Order not found");
        });

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
