info:
  name: 03_Order-NoAuth
  type: http
  seq: 3

http:
  method: POST
  url: "{{URL}}/orders"
  headers:
    - name: Authorization
      value: Bearer {{jwt_token}}
  body:
    type: json
    data: |-
      {
        "itemId": {{itemId}},
        "quantity": 1
      }
  auth: inherit

runtime:
  scripts:
    - type: after-response
      code: |-
        test("Status code is 401 Unauthorized", function() {
            expect(res.getStatus()).to.equal(401);
        });

        test("Should return error message for unauthenticated request", function() {
          const body = res.getBody();
          // ตรวจสอบว่ามี field ที่ระบุถึงความผิดพลาด
          expect(body).to.have.property('error');
          expect(body.error).to.equal("Unauthorized")
        });

        bru.runner.setNextRequest("04_Auth-Correct");

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
